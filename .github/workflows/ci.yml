name: Build Solution

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1.1

      - name: Build Solution
        # /p:Configuration=Release - kompajlira u Release modu
        # /p:AdditionalIncludeDirectories=include - kaže mu da traži .h fajlove u tvom 'include' folderu
        run: msbuild ZastitaInformacija.sln /p:Configuration=Release /p:AdditionalIncludeDirectories=include